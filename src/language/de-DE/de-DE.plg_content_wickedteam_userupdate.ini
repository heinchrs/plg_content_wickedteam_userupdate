PLG_WICKEDTEAM_USERUPDATE_EMAIL_LABEL="Wickedteam Email Feld"
PLG_WICKEDTEAM_USERUPDATE_EMAIL_DESC="Wählen Sie hier das Wickedteam Feld aus, in dem Sie die Email-Adresse eines Wickedteam Mitglieds verwalten. Der Inhalt dieses Feldes wird bei Änderung in die Mailadresse des zugeordneten Joomla User übertragen. <br/>Die Liste enthält alle von Ihnen bereits angelegten Wickedteam Felder."
PLG_WICKEDTEAM_USERUPDATE_LASTNAME_LABEL="Wickedteam Nachnamen Feld"
PLG_WICKEDTEAM_USERUPDATE_LASTNAME_DESC="Wählen Sie hier das Wickedteam Feld aus, in dem Sie den Nachname eines Wickedteam Mitglieds verwalten. Der Inhalt dieses Feldes wird zusammen mit dem Vornamen in der Notification Mail aufgeführt, um zu beschreiben welches Member angepasst wurde. <br/>Die Liste enthält alle von Ihnen bereits angelegten Wickedteam Felder."
