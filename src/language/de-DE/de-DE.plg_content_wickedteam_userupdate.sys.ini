PLG_WICKEDTEAM_USERUPDATE_NAME="Inhalt - Wickedteam Userupdate"
PLG_WICKEDTEAM_USERUPDATE_DESCRIPTION="<h1>Plugin 'Wickedteam User Update'</h1>Das Plugin setzt eine Installation der <a href="https://shop.wicked-software.de/" target="_blank">WickedTeam-Komponente</a> voraus.<br/><br/>Wenn Wickedteam Memberdaten geändert oder neu eingegeben werden, versendet dieses Plugin Emails mit den geänderten Werten. Dazu muss eine entsprechende E-Mail-Adresse über die Plugin-Parameter angegeben werden, an welche die Benachrichtigungs Email gesendet werden soll.<br/>Zusätzlich kann die Email-Adresse eines zugewiesenen Joomla Users entsprechend aktualisiert werden, wenn die Mail-Adresse des jeweiligen Wickedteam Members geändert wird.<br/>Dazu muss dem Plugin mitgeteilt werden in welchem Wickedteam-Feld die Email-Adressen abgelegt sind. Sollte dieses Feld als kopierbares Feld angelegt sein, so wird immer nur der Inhalt des Basis-Feldes als neue Email-Adresse des zugehörigen Joomla Users übernommen.<br/>Ist dem Wickedteam Mitglied kein Joomla User zugeordnet wird keine Aktualisierung eines Joomla Benutzers vorgenommen.<br/><br/>Viel Spaß damit ;-)<br><br><br><br>"
