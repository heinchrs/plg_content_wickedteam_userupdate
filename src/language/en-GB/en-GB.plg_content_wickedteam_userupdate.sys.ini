PLG_WICKEDTEAM_USERUPDATE_NAME="Content - Wickedteam Userupdate"
PLG_WICKEDTEAM_USERUPDATE_DESCRIPTION="<h1>Plugin 'Wickedteam User Update'</h1>This plugin requires an installation of the <a href="https://shop.wicked-software.de/" target="_blank">WickedTeam-Component</a>.<br/><br/>If Wickedteam memberdata is changed or newly inserted, this plugin notifies about these values. Therefore a email address must be configured via plugin parameter where the notification email should be sent to.<br/>Additionally the email address of the assigned Joomla user will be changed accordingly if the email field of a Wickedteam member is changed.<br/>Therefore the plugin has to know in which Wickedteam field the email addresses are stored. If this field is created as a copy-field, only the content of the base field is used as the new email address for the associated Joomla user.<br/>If no Joomla user is assigned to the Wickedteam member no update of Joomla user data is performed. <br/><br/>Have fun with it ;-)<br><br><br><br>"
